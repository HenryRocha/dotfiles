#==========================================================
# COLORS
#==========================================================
[color]
include-file = /home/henryrocha/.config/polybar/colors.conf

#==========================================================
# BAR
#==========================================================
[bar/main]
# Bar size and placement
monitor = ${env:MAIN_MONITOR}
width = 100%
height = 25
bottom = true
fixed-center = true
wm-restack = bspwm

# Bar colors
background = ${color.bground}
foreground = ${color.fground}

# Bar font
# font-0 = "Hack:style=Regular:size=10;3"
font-0 = "JetBrains Mono:style=Regular:size=10;3"
font-1 = "Font Awesome 5 Free:style=Regular:pixelsize=11;3"
font-2 = "Font Awesome 5 Free:style=Solid:pixelsize=11;3"
font-3 = "Font Awesome 5 Brands:pixelsize=11;3"

# System Tray
tray-position = right
tray-background = ${color.shade1}
tray-padding = 1

# Module position
modules-left = launcher left1 bspwm left2 windowTitle left3
modules-center =
modules-right = right7 updates-pacman updates-aur right5 xkeyboard pulseaudio right4 battery right3 memory right2 cpu right1 date powermenu

#==========================================================
# MODULES
#==========================================================
#------------
# LEFT
#------------
[module/launcher]
type = custom/text
content = пќ»

content-background = ${color.shade1}
content-foreground = ${color.modulefg}
content-padding = 1

click-left = rofi -show drun -show-icons -sidebar-mode -location 7 -yoffset -27 -width 20

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
inline-mode = false
enable-click = false
enable-scroll = false
reverse-scroll = false
fuzzy-match = true

ws-icon-0 = 1;п‚¬
ws-icon-1 = 2;п„Ў
ws-icon-2 = 3;п„ 
ws-icon-3 = 4;пЃј
ws-icon-4 = 5;пЂЃ
ws-icon-default = п‰¬

format = <label-state>
format-background = ${color.shade2}
format-foreground = ${color.modulefg}

label-focused = " %icon% "
label-urgent = " %icon% "
label-occupied = " %icon% "
label-empty = " %icon% "

label-focused-foreground = ${color.accent}
label-occupied-foreground = ${color.yellow}
label-urgent-foreground = ${color.red}
label-empty-foreground = ${color.modulefg-alt}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = false

icon-0 = 1;п‚¬
icon-1 = 2;п„Ў
icon-2 = 3;п„ 
icon-3 = 4;пЃј
icon-4 = 5;пЂЃ
icon-default = п‰¬

format = <label-state>
format-background = ${color.shade2}
format-foreground = ${color.modulefg}

label-active = " %icon% "
label-urgent = " %icon% "
label-occupied = " %icon% "
label-empty = " %icon% "

label-active-foreground = ${color.accent}
label-occupied-foreground = ${color.yellow}
label-urgent-foreground = ${color.red}
label-empty-foreground = ${color.modulefg-alt}

[module/windowTitle]
type = internal/xwindow
label-maxlen = 30
label-empty= " Arch Linux "

format-padding = 1
format-background = ${color.shade3}
format-foreground = ${color.modulefg}

#------------
# RIGHT
#------------
[module/powermenu]
type = custom/text
content = " пЂ‘ "
content-background = ${color.shade1}
click-left = zsh $HOME/.config/rofi/scripts/powermenu.sh

[module/date]
type = internal/date
interval = 30

date = %d/%m/%Y
time = %H:%M

format-background = ${color.shade1}
format-foreground = ${color.modulefg}
label = " пЂ— %time% пЃі %date% "

[module/cpu]
type = internal/cpu
interval = 5

format-background = ${color.shade2}
format-foreground = ${color.modulefg}
format = <label>
label = " п‹› %percentage%% "

[module/memory]
type = internal/memory
interval = 5

format-background = ${color.shade3}
format-foreground = ${color.modulefg}
format = <label>
# label = " п”ё %gb_used%/%gb_total% "
label = " п”ё %percentage_used%% "

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC0
full-at = 98
poll-interval = 5

format-charging = <animation-charging> <label-charging>
label-charging = "%percentage%% "
format-charging-background = ${color.shade4}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = "%percentage%% "
format-discharging-background = ${color.shade4}

ramp-capacity-0 = " п‰„"
ramp-capacity-1 = " п‰ѓ"
ramp-capacity-2 = " п‰‚"
ramp-capacity-3 = " п‰Ѓ"
ramp-capacity-4 = " п‰Ђ"

animation-charging-0 = " п—§"

[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_12_00.3.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.shade5}
format-volume-suffix = " "

label-muted = "пљ© "
label-muted-background = ${color.shade5}

ramp-volume-0 = пЂ¦
ramp-volume-1 = пЂ§
ramp-volume-2 = пЂЁ

[module/xkeyboard]
type = internal/xkeyboard
interval = 1
format = <label-layout>

blacklist-0 = num lock
blacklist-1 = scroll lock

label-layout = " п‚¬ %layout% "
label-layout-background = ${color.shade5}

[module/updates-aur]
type = custom/script
exec = yay -Qum 2> /dev/null | wc -l
interval = 600

format-prefix = "п’ћ "
format-suffix = " "
format-background = ${color.shade6}

[module/updates-pacman]
type = custom/script
exec = checkupdates 2> /dev/null | wc -l
interval = 600

format-prefix = " "
format-suffix = " "
format-background = ${color.shade6}

